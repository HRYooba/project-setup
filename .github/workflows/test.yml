name: test

# hook（PR 前門番・effort nudge）と apply.mjs のユニットテスト。
# 依存なし（Node 標準の test runner）なので checkout + node のみで走る。

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test "tests/*.test.mjs"
