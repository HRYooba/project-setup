name: test

# lint（eslint）とユニットテスト（Node 標準の test runner）。
# eslint はテンプレート .mjs（配備先へコピーされる hook / installer）が配備先の CI を
# 壊さないよう source 側で検証する。テスト対象は hook（PR 前門番・effort nudge）と apply.mjs。

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
